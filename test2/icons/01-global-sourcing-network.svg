<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="#D9A757">
  <!-- Ship's wheel (nautical helm) representing global sourcing network -->
  <circle cx="32" cy="32" r="5"/>
  <!-- Outer ring -->
  <path d="M32 8a24 24 0 1 0 0 48 24 24 0 0 0 0-48zm0 4a20 20 0 1 1 0 40 20 20 0 0 1 0-40z"/>
  <!-- Inner hub ring -->
  <path d="M32 20a12 12 0 1 0 0 24 12 12 0 0 0 0-24zm0 3a9 9 0 1 1 0 18 9 9 0 0 1 0-18z"/>
  <!-- Spokes: 8 spokes connecting hub to rim -->
  <!-- Top -->
  <rect x="30" y="8" width="4" height="14" rx="1"/>
  <!-- Bottom -->
  <rect x="30" y="42" width="4" height="14" rx="1"/>
  <!-- Left -->
  <rect x="8" y="30" width="14" height="4" rx="1"/>
  <!-- Right -->
  <rect x="42" y="30" width="14" height="4" rx="1"/>
  <!-- Diagonal spokes -->
  <rect x="30" y="8" width="4" height="14" rx="1" transform="rotate(45 32 32)"/>
  <rect x="30" y="42" width="4" height="14" rx="1" transform="rotate(45 32 32)"/>
  <rect x="30" y="8" width="4" height="14" rx="1" transform="rotate(-45 32 32)"/>
  <rect x="30" y="42" width="4" height="14" rx="1" transform="rotate(-45 32 32)"/>
  <!-- Handles at rim (pegs sticking out) -->
  <rect x="30" y="3" width="4" height="6" rx="1"/>
  <rect x="30" y="55" width="4" height="6" rx="1"/>
  <rect x="3" y="30" width="6" height="4" rx="1"/>
  <rect x="55" y="30" width="6" height="4" rx="1"/>
</svg>
